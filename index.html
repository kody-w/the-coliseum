<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Coliseum — Floor</title>
<style>
  :root{
    --bg:#0a0705; --bg2:#140d08; --gold:#c9a227; --gold2:#f0d27a;
    --blood:#7a1014; --blood2:#c1272d; --bone:#e8dcc0; --stone:#1d1611;
    --alpha:#c1272d; --omega:#2f6fb0; --dim:#8a7c5e;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:
      radial-gradient(1200px 600px at 50% -10%, #2a1d10 0%, transparent 60%),
      linear-gradient(180deg,#0a0705,#000);
    color:var(--bone); font-family:"Trajan Pro","Times New Roman",Georgia,serif;
    overflow-x:hidden;
  }
  header{
    text-align:center; padding:18px 12px 6px; border-bottom:2px solid var(--blood);
    background:linear-gradient(180deg,rgba(40,28,14,.6),transparent);
  }
  h1{margin:0; font-size:34px; letter-spacing:6px; color:var(--gold2);
     text-shadow:0 0 14px rgba(201,162,39,.6),0 2px 0 #000}
  .sub{color:var(--dim); letter-spacing:3px; font-size:12px; margin-top:4px}
  .bar{display:flex;gap:10px;justify-content:center;align-items:center;margin:8px;flex-wrap:wrap}
  .bar button{background:var(--stone);color:var(--gold2);border:1px solid var(--gold);
    padding:6px 14px;letter-spacing:2px;cursor:pointer;font-family:inherit;border-radius:3px}
  .bar button:hover{background:var(--blood);color:#fff}
  #status{color:var(--dim);font-size:12px}
  main{display:grid;grid-template-columns:1.1fr 1.4fr;gap:16px;padding:14px;max-width:1500px;margin:0 auto}
  .panel{background:linear-gradient(180deg,#15100a,#0c0805);border:1px solid #3a2c16;
    border-radius:6px;padding:12px;box-shadow:0 6px 30px #000 inset, 0 0 0 1px #000}
  .panel h2{margin:0 0 10px;color:var(--gold);letter-spacing:4px;font-size:18px;
    border-bottom:1px solid var(--blood);padding-bottom:6px;text-transform:uppercase}
  .feed{max-height:48vh;overflow:auto}
  .match{padding:8px 10px;margin-bottom:6px;border-left:3px solid var(--gold);
    background:#0e0a06;border-radius:3px;animation:in .4s ease}
  .match.draw{border-left-color:var(--dim)}
  @keyframes in{from{opacity:0;transform:translateX(-12px)}to{opacity:1}}
  .vs{font-size:13px}.win{color:var(--gold2);font-weight:bold}.lose{color:#9b8f72}
  .chal{color:var(--blood2);letter-spacing:2px;font-size:11px;text-transform:uppercase}
  .sc{color:var(--dim);font-size:11px;margin-top:2px}
  .roster{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px;max-height:48vh;overflow:auto}
  .card{border:1px solid #3a2c16;border-radius:5px;padding:10px;background:#0e0a06;position:relative}
  .card .nm{font-size:15px;color:var(--gold2);letter-spacing:1px}
  .card.dead{opacity:.45;filter:grayscale(.7)}
  .card.dead .nm{text-decoration:line-through;color:#a55}
  .bl{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:5px;vertical-align:middle}
  .meta{font-size:11px;color:var(--dim);margin:3px 0 6px}
  .trait{display:flex;align-items:center;gap:6px;font-size:10px;margin:2px 0}
  .trait label{width:62px;color:#b9a87f;text-transform:uppercase;letter-spacing:1px}
  .track{flex:1;height:8px;background:#241a0e;border-radius:4px;overflow:hidden}
  .fill{height:100%;background:linear-gradient(90deg,var(--blood2),var(--gold))}
  .wl .w{color:var(--gold2)}.wl .l{color:var(--blood2)}
  .foss{grid-column:1/-1}
  .gen{margin-bottom:10px}.gen h3{margin:0 0 6px;color:var(--blood2);letter-spacing:3px;font-size:13px}
  .gnodes{display:flex;flex-wrap:wrap;gap:6px}
  .gnode{font-size:11px;padding:4px 8px;border:1px solid #3a2c16;border-radius:3px;background:#0e0a06}
  .gnode.dead{opacity:.4;text-decoration:line-through}
  .gnode small{color:var(--dim)}
  .empty{color:var(--dim);font-style:italic;padding:14px}
  body.cinema main{grid-template-columns:1fr 1fr}
  body.cinema header h1{font-size:48px}
  body.cinema{padding:0}
  footer{text-align:center;color:#5a4d34;font-size:11px;padding:10px}
  @media(max-width:900px){main{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <h1>THE COLISEUM</h1>
  <div class="sub">— LIVE FROM THE FLOOR —</div>
  <div class="bar">
    <button id="fs">⛶ SPECTATOR</button>
    <button id="rf">↻ REFRESH</button>
    <span id="status">awaiting combatants…</span>
  </div>
</header>
<main>
  <section class="panel"><h2>Kill Feed</h2><div id="feed" class="feed"></div></section>
  <section class="panel"><h2>Roster</h2><div id="roster" class="roster"></div></section>
  <section class="panel foss"><h2>Fossil Record — Bloodlines</h2><div id="fossil"></div></section>
</main>
<footer>auto-refresh active · ave, spectator</footer>
<script>
const TRAITS=["ferocity","guile","creativity","discipline","nerve"];
const BL={alpha:"--alpha",omega:"--omega"};
let creatures={}, feed=[];
const $=s=>document.querySelector(s);
const esc=s=>String(s==null?"":s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const blColor=b=>BL[b]?getComputedStyle(document.documentElement).getPropertyValue(BL[b]):"#888";
const nm=id=>creatures[id]?creatures[id].name:(id?id.slice(0,6):"—");

async function jget(u){try{const r=await fetch(u+"?t="+Date.now());if(!r.ok)return null;return await r.json()}catch(e){return null}}
async function jlines(u){try{const r=await fetch(u+"?t="+Date.now());if(!r.ok)return[];return (await r.text()).split("\n").filter(Boolean).map(l=>{try{return JSON.parse(l)}catch(e){return null}}).filter(Boolean)}catch(e){return[]}}

async function load(){
  const idx=await jget("creatures/index.json")||[];
  const got={};
  await Promise.all(idx.map(async id=>{const c=await jget(`creatures/${id}.json`);if(c)got[c.id]=c;}));
  creatures=got; feed=await jlines("arena/feed.jsonl");
  render();
  $("#status").textContent=`${Object.keys(creatures).length} creatures · ${feed.length} matches · ${new Date().toLocaleTimeString()}`;
}
function renderFeed(){
  const el=$("#feed"); const ms=[...feed].reverse();
  if(!ms.length){el.innerHTML='<div class="empty">No matches yet. The sand is fresh.</div>';return}
  el.innerHTML=ms.slice(0,80).map(m=>{
    const aw=m.winner===m.a,bw=m.winner===m.b,dr=m.winner==="draw";
    return `<div class="match ${dr?'draw':''}"><div class="chal">⚔ ${esc(m.challenge)}</div>
    <div class="vs"><span class="${aw?'win':'lose'}">${esc(nm(m.a))}</span> vs <span class="${bw?'win':'lose'}">${esc(nm(m.b))}</span> — ${dr?'<b>DRAW</b>':'🏆 '+esc(nm(m.winner))}</div>
    <div class="sc">${(+m.score_a).toFixed(2)} : ${(+m.score_b).toFixed(2)}</div></div>`}).join("");
}
function renderRoster(){
  const el=$("#roster"),cs=Object.values(creatures).sort((a,b)=>(b.wins||0)-(a.wins||0));
  if(!cs.length){el.innerHTML='<div class="empty">No creatures spawned.</div>';return}
  el.innerHTML=cs.map(c=>`<div class="card ${c.alive?'':'dead'}"><div class="nm"><span class="bl" style="background:${blColor(c.bloodline)}"></span>${esc(c.name)}</div>
  <div class="meta">${esc(c.bloodline)} · gen ${c.generation} · <span class="wl"><span class="w">${c.wins||0}W</span>/<span class="l">${c.losses||0}L</span></span></div>
  ${TRAITS.map(t=>{const v=(c.genome&&c.genome[t])||0;return `<div class="trait"><label>${t}</label><div class="track"><div class="fill" style="width:${(v*100).toFixed(0)}%"></div></div></div>`}).join("")}</div>`).join("");
}
function renderFossil(){
  const el=$("#fossil"),cs=Object.values(creatures);
  if(!cs.length){el.innerHTML='<div class="empty">No lineage recorded.</div>';return}
  const gens={};cs.forEach(c=>{(gens[c.generation]=gens[c.generation]||[]).push(c)});
  el.innerHTML=Object.keys(gens).sort((a,b)=>a-b).map(g=>`<div class="gen"><h3>Generation ${g}</h3><div class="gnodes">`+
    gens[g].map(c=>`<div class="gnode ${c.alive?'':'dead'}"><span class="bl" style="background:${blColor(c.bloodline)}"></span>${esc(c.name)}${c.parents&&c.parents.length?` <small>← ${c.parents.map(nm).map(esc).join(" + ")}</small>`:""}</div>`).join("")+
    `</div></div>`).join("");
}
function render(){renderFeed();renderRoster();renderFossil()}
$("#rf").onclick=load;
$("#fs").onclick=()=>{document.body.classList.toggle("cinema");if(document.fullscreenElement)document.exitFullscreen();else document.documentElement.requestFullscreen?.()};
load();setInterval(load,4000);
</script>
</body>
</html>
